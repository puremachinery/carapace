name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RUST_STABLE_TOOLCHAIN: 1.94.1

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cara-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cara-aarch64-linux
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: cara-x86_64-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: cara-aarch64-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: cara-x86_64-windows.exe

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: ${{ env.RUST_STABLE_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/cara ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/cara.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    env:
      RELEASE_NOTES_PATH: docs/releases/${{ github.ref_name }}.md
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Validate curated release notes
        run: |
          set -euo pipefail
          if [ ! -f "$RELEASE_NOTES_PATH" ]; then
            echo "missing curated release notes: $RELEASE_NOTES_PATH" >&2
            exit 1
          fi

      - name: Generate checksums
        run: |
          set -euo pipefail
          find artifacts -maxdepth 1 -type f ! -name 'SHA256SUMS.txt' -print0 \
            | sort -z \
            | xargs -0 -I{} sh -c 'sha256sum "$1" | sed "s|artifacts/||"' _ {} \
            > artifacts/SHA256SUMS.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign release artifacts
        run: |
          set -euo pipefail
          shopt -s nullglob
          for artifact in artifacts/*; do
            if [ -f "$artifact" ]; then
              cosign sign-blob --yes \
                --bundle "${artifact}.bundle" \
                --output-signature "${artifact}.sig" \
                --output-certificate "${artifact}.pem" \
                "$artifact"
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body_path: ${{ env.RELEASE_NOTES_PATH }}
          files: artifacts/*
