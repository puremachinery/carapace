name: CodeQL Actions

on:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/**"
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "10 6 * * 1"

concurrency:
  group: codeql-actions-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  analyze-actions:
    name: Analyze (actions)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: github/codeql-action/init@c793b717bc78562f491db7b0e93a3a178b099162 # v3
        with:
          languages: actions
      - uses: github/codeql-action/analyze@c793b717bc78562f491db7b0e93a3a178b099162 # v3
        with:
          category: /language:actions
