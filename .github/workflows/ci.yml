name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      test_lane:
        description: Test lane to run manually
        required: true
        type: choice
        options:
          - integration
          - full

concurrency:
  group: ci-${{ github.event_name }}-${{ github.head_ref || github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.test_lane || 'default' }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_STABLE_TOOLCHAIN: 1.94.1
  RUST_MSRV_TOOLCHAIN: 1.93.0
  CARGO_NEXTEST_VERSION: 0.9.132
  CARGO_AUDIT_VERSION: 0.22.1
  CARGO_DENY_VERSION: 0.19.0
  CARGO_GEIGER_VERSION: 0.13.0
  RUST_BACKTRACE: 1

jobs:
  changes:
    name: Detect Changed Categories
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      workflow: ${{ steps.filter.outputs.workflow }}
      rust_runtime: ${{ steps.filter.outputs.rust_runtime }}
      windows_sensitive: ${{ steps.filter.outputs.windows_sensitive }}
      docker: ${{ steps.filter.outputs.docker }}
      control_ui: ${{ steps.filter.outputs.control_ui }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: filter
        shell: bash
        run: |
          set -euo pipefail

          docs=false
          workflow=false
          rust_runtime=false
          windows_sensitive=false
          docker=false
          control_ui=false

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
            mapfile -t changed_files < <(git diff --name-only "$base_sha...$head_sha")
          else
            before_sha="${{ github.event.before }}"
            after_sha="${{ github.sha }}"
            if [[ "$before_sha" == "0000000000000000000000000000000000000000" ]]; then
              mapfile -t changed_files < <(git show --pretty='' --name-only "$after_sha")
            else
              mapfile -t changed_files < <(git diff --name-only "$before_sha" "$after_sha")
            fi
          fi

          for path in "${changed_files[@]}"; do
            [[ -z "$path" ]] && continue

            if [[ "$path" == docs/* || "$path" == website/* || "$path" == *.md || "$path" == "scripts/check-docs-state-messaging.sh" || "$path" == "LICENSE" ]]; then
              docs=true
            fi

            if [[ "$path" == .github/workflows/* ]]; then
              workflow=true
            fi

            if [[ "$path" == src/* || "$path" == tests/* || "$path" == fuzz/* || "$path" == wit/* || "$path" == ".cargo/"* || "$path" == ".config/nextest.toml" || "$path" == "Cargo.toml" || "$path" == "Cargo.lock" || "$path" == "build.rs" || "$path" == "deny.toml" || "$path" == "config.example.json5" || "$path" == "rust-toolchain.toml" || "$path" == "rust-toolchain" ]]; then
              rust_runtime=true
            fi

            if [[ "$path" == "src/agent/sandbox.rs" || "$path" == "src/credentials/windows.rs" || "$path" == "src/discovery/mod.rs" || "$path" == "src/server/bind.rs" || "$path" == "src/tailscale/mod.rs" || "$path" == "Cargo.toml" || "$path" == "Cargo.lock" || "$path" == .github/workflows/* ]]; then
              windows_sensitive=true
            fi

            if [[ "$path" == "Dockerfile" || "$path" == ".dockerignore" || "$path" == ".hadolint.yaml" ]]; then
              docker=true
            fi

            if [[ "$path" == ui/control-ui/* || "$path" == dist/control-ui/* || "$path" == "scripts/build-control-ui.sh" || "$path" == "package.json" ]]; then
              control_ui=true
            fi
          done

          {
            echo "docs=$docs"
            echo "workflow=$workflow"
            echo "rust_runtime=$rust_runtime"
            echo "windows_sensitive=$windows_sensitive"
            echo "docker=$docker"
            echo "control_ui=$control_ui"
          } >> "$GITHUB_OUTPUT"

          printf 'Changed files (%d):\n' "${#changed_files[@]}"
          printf '  %s\n' "${changed_files[@]}"
          echo "docs=$docs workflow=$workflow rust_runtime=$rust_runtime windows_sensitive=$windows_sensitive docker=$docker control_ui=$control_ui"

  fmt:
    name: Format
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_runtime == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: ${{ env.RUST_STABLE_TOOLCHAIN }}
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_runtime == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: ${{ env.RUST_STABLE_TOOLCHAIN }}
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  matrix-no-openssl:
    name: Matrix OpenSSL Guard
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_runtime == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: ${{ env.RUST_STABLE_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - name: Ensure Matrix dependency graph does not enable OpenSSL
        shell: bash
        run: |
          set -euo pipefail
          # Capture cargo tree output into a variable. Inlining the
          # pipeline inside `if cargo tree ... | grep ...; then` would
          # let a `cargo tree` failure (e.g. lockfile drift, registry
          # outage) silently make the `if` condition false — the
          # guard would skip its `exit 1` and report success even
          # though dependency scanning never actually ran. Capturing
          # the output first runs cargo tree at the top level under
          # `set -e`, so any failure aborts the step before grep
          # sees it.
          tree_output=$(cargo tree --locked --all-features --all-targets -e features)
          # The regex matches the crate name followed by ` v<version>`
          # so `openssl-probe v0.4.x` (legitimate, doesn't pull the
          # OpenSSL libs) is not flagged: after `openssl` comes `-`,
          # not ` v`. The trailing `grep -v openssl-probe` is
          # defense-in-depth in case a future cargo-tree format change
          # drops the ` v` separator.
          if echo "$tree_output" \
              | grep -Ei '(^|[[:space:]])(openssl|openssl-sys|native-tls) v' \
              | grep -v openssl-probe; then
            echo "OpenSSL appeared in the Cargo feature graph; Matrix must stay on rustls."
            exit 1
          fi

  runtime-bridge-guard:
    name: Runtime Bridge Guard
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_runtime == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Enforce runtime bridge boundaries
        run: ./scripts/check-runtime-bridge-usage.sh

  ws-golden:
    name: WS Golden
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_runtime == 'true' && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: ${{ env.RUST_STABLE_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - uses: taiki-e/install-action@602dc500e2b7e0e2486b4ce53909ba048de44e08 # nextest
        with:
          tool: nextest@${{ env.CARGO_NEXTEST_VERSION }}
      - name: Run nextest (golden lane)
        run: ./scripts/run-nextest-guarded.sh --all-targets -P golden
      - name: Upload nextest stall diagnostics (ws-golden)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextest-list-stall-ws-golden-${{ github.run_id }}-${{ github.run_attempt }}
          path: .local/reports/nextest-list-stalls/**
          if-no-files-found: ignore
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_runtime == 'true' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: ${{ env.RUST_STABLE_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - run: cargo build --all-targets

  test-pr:
    name: Test (ubuntu PR)
    runs-on: ubuntu-latest
    needs: [changes, ws-golden]
    if: needs.changes.outputs.rust_runtime == 'true' && needs.ws-golden.result == 'success' && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: ${{ env.RUST_STABLE_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - uses: taiki-e/install-action@602dc500e2b7e0e2486b4ce53909ba048de44e08 # nextest
        with:
          tool: nextest@${{ env.CARGO_NEXTEST_VERSION }}
      - name: Run nextest (fast lane)
        run: ./scripts/run-nextest-guarded.sh --all-targets -P fast
      - name: Upload nextest stall diagnostics (test-pr)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextest-list-stall-test-pr-${{ github.run_id }}-${{ github.run_attempt }}
          path: .local/reports/nextest-list-stalls/**
          if-no-files-found: ignore
          retention-days: 14

  test-push:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: changes
    if: needs.changes.outputs.rust_runtime == 'true' && github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: ${{ env.RUST_STABLE_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - uses: taiki-e/install-action@602dc500e2b7e0e2486b4ce53909ba048de44e08 # nextest
        with:
          tool: nextest@${{ env.CARGO_NEXTEST_VERSION }}
      - name: Run nextest (full lane)
        if: runner.os != 'Windows'
        run: ./scripts/run-nextest-guarded.sh --all-targets -P full
      - name: Run nextest (Windows full lane)
        if: runner.os == 'Windows'
        run: cargo nextest run --all-targets -P full
      - name: Upload nextest stall diagnostics (test-push)
        if: failure() && runner.os != 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextest-list-stall-test-push-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: .local/reports/nextest-list-stalls/**
          if-no-files-found: ignore
          retention-days: 14

  test-pr-windows:
    name: Test (windows PR)
    runs-on: windows-latest
    needs: [changes, ws-golden]
    if: needs.changes.outputs.rust_runtime == 'true' && needs.ws-golden.result == 'success' && github.event_name == 'pull_request' && needs.changes.outputs.windows_sensitive == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: ${{ env.RUST_STABLE_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - uses: taiki-e/install-action@602dc500e2b7e0e2486b4ce53909ba048de44e08 # nextest
        with:
          tool: nextest@${{ env.CARGO_NEXTEST_VERSION }}
      - name: Run nextest (fast lane)
        run: cargo nextest run --all-targets -P fast

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_runtime == 'true' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # 1.93.0
        with:
          toolchain: ${{ env.RUST_MSRV_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - run: cargo check --all-targets

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_runtime == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: ${{ env.RUST_STABLE_TOOLCHAIN }}
      - uses: taiki-e/install-action@468f60710537884ebb9b0e713dad1957996a55f2 # cargo-audit
        with:
          tool: cargo-audit@${{ env.CARGO_AUDIT_VERSION }}
      - run: cargo audit

  deny:
    name: Dependency Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_runtime == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: ${{ env.RUST_STABLE_TOOLCHAIN }}
      - uses: taiki-e/install-action@f63130e3904c76fd4045473e61389a5266ee4cc0 # cargo-deny
        with:
          tool: cargo-deny@${{ env.CARGO_DENY_VERSION }}
      - name: Run cargo deny with transient-network retries
        run: |
          set -euo pipefail
          max_attempts=3
          delay_seconds=15

          for attempt in $(seq 1 "$max_attempts"); do
            echo "cargo deny check attempt ${attempt}/${max_attempts}"
            if cargo deny check; then
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "cargo deny check failed (likely transient upstream/network issue); retrying in ${delay_seconds}s..."
              sleep "$delay_seconds"
              delay_seconds=$((delay_seconds * 2))
            fi
          done

          echo "cargo deny check failed after ${max_attempts} attempts."
          exit 1

  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  hadolint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile

  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_runtime == 'true' || needs.changes.outputs.docker == 'true' || needs.changes.outputs.workflow == 'true'
    env:
      # trivy-action 0.34.1 defaults to v0.69.1, which exists as a tag but not a
      # published GitHub release. Pin an actual released version so the installer
      # can download binaries deterministically.
      TRIVY_VERSION: v0.69.3
      # Avoid transient mirror.gcr.io 404s when pulling Trivy databases.
      TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2
      TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db:1
      TRIVY_CHECKS_BUNDLE_REPOSITORY: ghcr.io/aquasecurity/trivy-checks:1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: fs
          scan-ref: .
          version: ${{ env.TRIVY_VERSION }}
          severity: CRITICAL,HIGH
          exit-code: 1
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: config
          scan-ref: .
          version: ${{ env.TRIVY_VERSION }}
          severity: CRITICAL,HIGH
          exit-code: 1

  geiger:
    name: Unsafe Code Audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rust_runtime == 'true' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: ${{ env.RUST_STABLE_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - uses: taiki-e/install-action@602dc500e2b7e0e2486b4ce53909ba048de44e08 # cargo-geiger
        with:
          tool: cargo-geiger@${{ env.CARGO_GEIGER_VERSION }}
      - name: Report unsafe usage
        run: cargo geiger --all-targets --output-format ascii 2>&1 | tee geiger-report.txt
      - name: Upload geiger report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: geiger-report
          path: geiger-report.txt

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.workflow == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run actionlint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12
        with:
          args: -color -shellcheck=

  docs-check:
    name: Docs Check
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Basic markdown sanity check
        run: |
          echo "Checking Markdown files for hard tabs"
          if grep -RIn $'\t' --include='*.md' --exclude-dir=.git --exclude-dir=target .; then
            echo "Found tab characters in Markdown files; please use spaces."
            exit 1
          fi
      - name: Verify current docs/site state messaging
        run: ./scripts/check-docs-state-messaging.sh

  control-ui-sync:
    name: Control UI Dist Sync
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.control_ui == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify source/dist parity
        run: ./scripts/check-control-ui-dist.sh

  test-manual-integration:
    name: Test (manual integration)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.test_lane == 'integration'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: ${{ env.RUST_STABLE_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - uses: taiki-e/install-action@602dc500e2b7e0e2486b4ce53909ba048de44e08 # nextest
        with:
          tool: nextest@${{ env.CARGO_NEXTEST_VERSION }}
      - name: Run nextest (integration lane)
        run: ./scripts/run-nextest-guarded.sh --all-targets -P integration
      - name: Upload nextest stall diagnostics (manual integration)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextest-list-stall-manual-integration-${{ github.run_id }}-${{ github.run_attempt }}
          path: .local/reports/nextest-list-stalls/**
          if-no-files-found: ignore
          retention-days: 14

  test-manual-full:
    name: Test (manual full / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    if: github.event_name == 'workflow_dispatch' && inputs.test_lane == 'full'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: ${{ env.RUST_STABLE_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
      - uses: taiki-e/install-action@602dc500e2b7e0e2486b4ce53909ba048de44e08 # nextest
        with:
          tool: nextest@${{ env.CARGO_NEXTEST_VERSION }}
      - name: Run nextest (full lane)
        if: runner.os != 'Windows'
        run: ./scripts/run-nextest-guarded.sh --all-targets -P full
      - name: Run nextest (Windows full lane)
        if: runner.os == 'Windows'
        run: cargo nextest run --all-targets -P full
      - name: Upload nextest stall diagnostics (manual full)
        if: failure() && runner.os != 'Windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nextest-list-stall-manual-full-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: .local/reports/nextest-list-stalls/**
          if-no-files-found: ignore
          retention-days: 14

  ci-required:
    name: CI Required
    runs-on: ubuntu-latest
    if: always() && github.event_name != 'workflow_dispatch'
    needs:
      - changes
      - fmt
      - clippy
      - matrix-no-openssl
      - runtime-bridge-guard
      - ws-golden
      - build
      - test-pr
      - test-pr-windows
      - test-push
      - msrv
      - audit
      - deny
      - gitleaks
      - hadolint
      - trivy
      - geiger
      - workflow-lint
      - docs-check
      - control-ui-sync
    steps:
      - name: Ensure dependent jobs are success or skipped
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          FMT_RESULT: ${{ needs.fmt.result }}
          CLIPPY_RESULT: ${{ needs.clippy.result }}
          MATRIX_NO_OPENSSL_RESULT: ${{ needs['matrix-no-openssl'].result }}
          RUNTIME_BRIDGE_GUARD_RESULT: ${{ needs['runtime-bridge-guard'].result }}
          WS_GOLDEN_RESULT: ${{ needs['ws-golden'].result }}
          BUILD_RESULT: ${{ needs.build.result }}
          TEST_PR_RESULT: ${{ needs['test-pr'].result }}
          TEST_PR_WINDOWS_RESULT: ${{ needs['test-pr-windows'].result }}
          TEST_PUSH_RESULT: ${{ needs['test-push'].result }}
          MSRV_RESULT: ${{ needs.msrv.result }}
          AUDIT_RESULT: ${{ needs.audit.result }}
          DENY_RESULT: ${{ needs.deny.result }}
          GITLEAKS_RESULT: ${{ needs.gitleaks.result }}
          HADOLINT_RESULT: ${{ needs.hadolint.result }}
          TRIVY_RESULT: ${{ needs.trivy.result }}
          GEIGER_RESULT: ${{ needs.geiger.result }}
          WORKFLOW_LINT_RESULT: ${{ needs['workflow-lint'].result }}
          DOCS_CHECK_RESULT: ${{ needs['docs-check'].result }}
          CONTROL_UI_SYNC_RESULT: ${{ needs['control-ui-sync'].result }}
        run: |
          set -euo pipefail

          names=(
            "changes"
            "fmt"
            "clippy"
            "matrix-no-openssl"
            "runtime-bridge-guard"
            "ws-golden"
            "build"
            "test-pr"
            "test-pr-windows"
            "test-push"
            "msrv"
            "audit"
            "deny"
            "gitleaks"
            "hadolint"
            "trivy"
            "geiger"
            "workflow-lint"
            "docs-check"
            "control-ui-sync"
          )

          results=(
            "$CHANGES_RESULT"
            "$FMT_RESULT"
            "$CLIPPY_RESULT"
            "$MATRIX_NO_OPENSSL_RESULT"
            "$RUNTIME_BRIDGE_GUARD_RESULT"
            "$WS_GOLDEN_RESULT"
            "$BUILD_RESULT"
            "$TEST_PR_RESULT"
            "$TEST_PR_WINDOWS_RESULT"
            "$TEST_PUSH_RESULT"
            "$MSRV_RESULT"
            "$AUDIT_RESULT"
            "$DENY_RESULT"
            "$GITLEAKS_RESULT"
            "$HADOLINT_RESULT"
            "$TRIVY_RESULT"
            "$GEIGER_RESULT"
            "$WORKFLOW_LINT_RESULT"
            "$DOCS_CHECK_RESULT"
            "$CONTROL_UI_SYNC_RESULT"
          )

          for i in "${!names[@]}"; do
            name="${names[$i]}"
            result="${results[$i]}"
            echo "${name}: ${result}"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "Job ${name} did not succeed"
              exit 1
            fi
          done
