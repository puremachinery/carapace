name: Pages

on:
  push:
    branches: [main, master]
    paths:
      - "website/**"
      - "docs/cookbook/**"
      - "docs/getting-started.md"
      - "docs/plugin-development.md"
      - "docs/release.md"
      - "docs/cli.md"
      - "docs/channels.md"
      - "docs/channel-smoke.md"
      - "docs/security.md"
      - "docs/security-comparison.md"
      - "docs/feature-status.yaml"
      - "docs/feature-evidence.yaml"
      - "docs/site/**"
      - "SECURITY.md"
      - "scripts/build-pages-content.sh"
      - "scripts/check-pages-links.sh"
      - "scripts/check-docs-state-messaging.sh"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare site
        run: |
          rm -rf public
          mkdir -p public
          cp -R website/. public/

      - name: Verify current docs/site state messaging
        run: ./scripts/check-docs-state-messaging.sh

      - name: Install Pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc

      - name: Render website docs pages from Markdown
        run: ./scripts/build-pages-content.sh public

      - name: Validate generated internal links
        run: ./scripts/check-pages-links.sh public

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: public

  deploy:
    name: Deploy Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
