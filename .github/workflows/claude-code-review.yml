name: Claude Code Review

on:
  # Use pull_request_target so workflow-changing PRs still run against
  # default-branch review logic. Review uses GitHub PR context only; do not
  # check out PR head in this job.
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    outputs:
      cleanup_started_at: ${{ steps.cleanup-window.outputs.started_at }}
      should_publish: ${{ steps.publish-decision.outputs.should_publish }}
      publish_result: ${{ steps.publish-review.outcome }}
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read

    steps:
      - name: Record cleanup window start time
        id: cleanup-window
        run: |
          # Safety buffer handles small clock skew between runner and GitHub timestamps.
          echo "started_at=$(date -u -d '2 minutes ago' +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Skip Claude review for Dependabot
        if: github.actor == 'dependabot[bot]'
        run: echo "Skipping Claude review for Dependabot PR."

      - name: Run Claude review analysis (GitHub-context only)
        id: claude-review
        if: github.actor != 'dependabot[bot]'
        continue-on-error: true
        uses: anthropics/claude-code-action@220272d38887a1caed373da96a9ffdb0919c26cc # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          settings: |
            {
              "permissions": {
                "deny": [
                  "Bash",
                  "Edit",
                  "Glob",
                  "Grep",
                  "LS",
                  "MultiEdit",
                  "NotebookEdit",
                  "NotebookRead",
                  "Read",
                  "Task",
                  "TodoWrite",
                  "WebFetch",
                  "WebSearch",
                  "Write"
                ]
              }
            }
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Analyze this pull request for correctness/regressions, security risks,
            test coverage gaps, and maintainability concerns.

            IMPORTANT:
            - Do NOT post any GitHub reviews/comments.
            - Do NOT call gh APIs for comments/reviews.
            - Do NOT modify repository contents, create commits/branches, or open/update pull requests.
            - Review this pull request using GitHub PR context; do not rely on a checked-out workspace.
            - Return only the structured review object that matches the provided schema.
            - Do not wrap the structured output in markdown or code fences.

            Required structured output example:
            {
              "header": "No in-scope blocking findings.",
              "summary": "one-paragraph summary",
              "inline_findings": [
                {
                  "severity": "high",
                  "scope": "in-scope",
                  "title": "short finding title",
                  "body": "one-paragraph explanation",
                  "path": "repo/relative/path.ext",
                  "line": 123
                }
              ],
              "advisory_findings": [
                {
                  "severity": "medium",
                  "scope": "out-of-scope",
                  "title": "short advisory title",
                  "body": "one-paragraph explanation"
                }
              ],
              "optional_followups": ["non-blocking follow-up item"]
            }

            Rules:
            - Allowed header values: "Blocking findings present.", "No in-scope blocking findings.", or "LGTM.".
            - Allowed severity values: "critical", "high", "medium".
            - Only in-scope critical/high/medium findings belong in inline_findings.
            - Never include low/info in inline_findings.
            - Low-only items go to optional_followups.
            - If inline_findings is non-empty, header MUST be "Blocking findings present.".
            - If inline_findings is empty and both advisory_findings and optional_followups are empty, header MUST be "LGTM.".
            - If inline_findings is empty and any advisory_findings/optional_followups exist, header MUST be "No in-scope blocking findings.".
          claude_args: |
            --json-schema '{"type":"object","additionalProperties":false,"properties":{"header":{"type":"string","enum":["Blocking findings present.","LGTM.","No in-scope blocking findings."]},"summary":{"type":"string","pattern":"\\S"},"inline_findings":{"type":"array","items":{"type":"object","additionalProperties":false,"properties":{"severity":{"type":"string","enum":["critical","high","medium"]},"scope":{"type":"string","enum":["in-scope"]},"title":{"type":"string","pattern":"\\S"},"body":{"type":"string","pattern":"\\S"},"path":{"type":"string","pattern":"\\S"},"line":{"type":"integer","minimum":1}},"required":["severity","scope","title","body","path","line"]}},"advisory_findings":{"type":"array","items":{"type":"object","additionalProperties":false,"properties":{"severity":{"type":"string","enum":["critical","high","medium"]},"scope":{"type":"string","enum":["out-of-scope"]},"title":{"type":"string","pattern":"\\S"},"body":{"type":"string","pattern":"\\S"}},"required":["severity","scope","title","body"]}},"optional_followups":{"type":"array","items":{"type":"string","pattern":"\\S"}}},"required":["header","summary","inline_findings","advisory_findings","optional_followups"]}'

      - name: Persist structured review output
        id: persist-review-json
        if: github.actor != 'dependabot[bot]' && steps.claude-review.outcome == 'success'
        env:
          REVIEW_JSON: ${{ steps.claude-review.outputs.structured_output }}
          REVIEW_JSON_PATH: ${{ runner.temp }}/claude-review.json
        run: |
          if [ -z "$REVIEW_JSON" ]; then
            echo "ERROR: Structured review output is empty. Expected steps.claude-review.outputs.structured_output to be non-empty."
            exit 1
          fi
          printf '%s' "$REVIEW_JSON" > "$REVIEW_JSON_PATH"

      - name: Validate Claude review output JSON
        id: validate-review-json
        if: github.actor != 'dependabot[bot]' && steps.claude-review.outcome == 'success'
        continue-on-error: true
        env:
          REVIEW_JSON_PATH: ${{ runner.temp }}/claude-review.json
        run: |
          test -f "$REVIEW_JSON_PATH"
          jq -e '
            type == "object" and
            ((.header == "Blocking findings present.") or
             (.header == "LGTM.") or
             (.header == "No in-scope blocking findings.")) and
            (.summary | type == "string" and (. | gsub("^\\s+|\\s+$"; "") | length > 0)) and
            (.inline_findings | type == "array") and
            (.advisory_findings | type == "array") and
            (.optional_followups | type == "array") and
            (((.inline_findings | length) > 0 and .header == "Blocking findings present.") or
             ((.inline_findings | length) == 0 and (((.advisory_findings | length) + (.optional_followups | length)) == 0) and .header == "LGTM.") or
             ((.inline_findings | length) == 0 and (((.advisory_findings | length) + (.optional_followups | length)) > 0) and .header == "No in-scope blocking findings.")) and
            (all(.inline_findings[]?; (["critical","high","medium"] | index(.severity)) != null and
              .scope == "in-scope" and
              (.title | type == "string" and (. | gsub("^\\s+|\\s+$"; "") | length > 0)) and
              (.body | type == "string" and (. | gsub("^\\s+|\\s+$"; "") | length > 0)) and
              (.path | type == "string" and (. | gsub("^\\s+|\\s+$"; "") | length > 0)) and
              (.line | type == "number" and floor == . and . >= 1))) and
            (all(.advisory_findings[]?; (["critical","high","medium"] | index(.severity)) != null and
              .scope == "out-of-scope" and
              (.title | type == "string" and (. | gsub("^\\s+|\\s+$"; "") | length > 0)) and
              (.body | type == "string" and (. | gsub("^\\s+|\\s+$"; "") | length > 0)))) and
            (all(.optional_followups[]?; type == "string" and (. | gsub("^\\s+|\\s+$"; "") | length > 0)))
          ' "$REVIEW_JSON_PATH" >/dev/null

      - name: Upload Claude review output
        id: upload-review-json
        if: github.actor != 'dependabot[bot]' && steps.claude-review.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
        with:
          name: claude-review-json
          path: ${{ runner.temp }}/claude-review.json
          if-no-files-found: warn

      - name: Fail on unexpected Claude failure
        if: github.actor != 'dependabot[bot]' && steps.claude-review.outcome == 'failure'
        run: |
          echo "Claude analysis failed."
          echo "  steps.claude-review.outcome=${{ steps.claude-review.outcome }}"
          echo "  steps.persist-review-json.outcome=${{ steps.persist-review-json.outcome }}"
          echo "  steps.validate-review-json.outcome=${{ steps.validate-review-json.outcome }}"
          echo "  steps.upload-review-json.outcome=${{ steps.upload-review-json.outcome }}"
          echo "See the logs for 'Run Claude review analysis (GitHub-context only)',"
          echo "'Persist structured review output', 'Validate Claude review output JSON',"
          echo "and 'Upload Claude review output' for detailed error information."
          exit 1

      - name: Decide publish eligibility
        id: publish-decision
        if: always()
        run: |
          should_publish=false
          if [[ "${{ github.actor }}" != "dependabot[bot]" ]] && \
             [[ "${{ steps.claude-review.outcome }}" == "success" ]] && \
             [[ "${{ steps.validate-review-json.outcome }}" == "success" ]]; then
            should_publish=true
          fi
          echo "should_publish=${should_publish}" >> "$GITHUB_OUTPUT"
      - name: Publish deterministic single review
        id: publish-review
        if: steps.publish-decision.outputs.should_publish == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          REVIEW_JSON_PATH: ${{ runner.temp }}/claude-review.json
          REVIEW_MARKER: "<!-- claude-review-run:${{ github.run_id }}:${{ github.run_attempt }} -->"
        with:
          github-token: ${{ steps.claude-review.outputs.github_token }}
          script: |
            const fs = require('fs');
            const path = process.env.REVIEW_JSON_PATH || '';
            if (!path) {
              core.setFailed('Missing REVIEW_JSON_PATH for the validated review output.');
              return;
            }
            if (!fs.existsSync(path)) {
              core.setFailed(`Validated review output file not found: ${path}`);
              return;
            }
            const raw = fs.readFileSync(path, 'utf8');
            if (!raw.trim()) {
              core.setFailed(`Validated review output file is empty: ${path}`);
              return;
            }
            const review = JSON.parse(raw);

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const commit_id = context.payload.pull_request.head.sha;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            function parseAddedLines(patch) {
              const lines = new Set();
              if (!patch) return lines;
              let newLine = 0;
              for (const l of patch.split('\n')) {
                const m = l.match(/^@@ -\d+(?:,\d+)? \+(\d+)(?:,\d+)? @@/);
                if (m) {
                  newLine = Number(m[1]);
                  continue;
                }
                if (l.startsWith('+') && !l.startsWith('+++ ')) {
                  lines.add(newLine);
                  newLine += 1;
                } else if (l.startsWith('-') && !l.startsWith('--- ')) {
                  // deleted line; do not advance RHS line
                } else if (l.startsWith('\\')) {
                  // metadata line (e.g. "\ No newline at end of file"); do not advance RHS line
                } else {
                  newLine += 1;
                }
              }
              return lines;
            }

            const changedLinesByPath = new Map();
            for (const f of files) {
              changedLinesByPath.set(f.filename, parseAddedLines(f.patch || ''));
            }

            const inline = Array.isArray(review.inline_findings) ? review.inline_findings : [];
            const advisory = Array.isArray(review.advisory_findings) ? review.advisory_findings : [];
            const followups = Array.isArray(review.optional_followups) ? review.optional_followups : [];

            const comments = [];
            const unplaced = [];

            for (const finding of inline) {
              const pRaw = String(finding.path || '');
              const p = pRaw.trim();
              if (!p) {
                unplaced.push(finding);
                continue;
              }
              const rawLine = finding.line;
              const parsedLine = Number(rawLine);
              const lineNumber = Number.isInteger(rawLine) ? rawLine : parsedLine;
              if (!Number.isInteger(lineNumber) || lineNumber <= 0) {
                unplaced.push(finding);
                continue;
              }
              const lineSet = changedLinesByPath.get(p);
              if (!lineSet || !lineSet.has(lineNumber)) {
                unplaced.push(finding);
                continue;
              }
              comments.push({
                path: p,
                line: lineNumber,
                side: 'RIGHT',
                body: `[${finding.severity}, in-scope] ${finding.title}\n\n${finding.body}`,
              });
            }

            let body = `${review.header}\n\n${String(review.summary || '').trim()}`;
            const reviewMarker = process.env.REVIEW_MARKER || '';

            if (inline.length > 0) {
              body += '\n\n### Blocking findings (required before merge)\n';
              for (const f of inline) {
                const loc = (f.path && f.line) ? ` (${f.path}:${f.line})` : '';
                body += `\n- [${f.severity}, in-scope] ${f.title}${loc}: ${f.body}`;
              }
            }

            if (advisory.length > 0) {
              body += '\n\n### Advisory findings (out-of-scope)\n';
              for (const f of advisory) {
                body += `\n- [${f.severity}, out-of-scope] ${f.title}: ${f.body}`;
              }
            }

            if (followups.length > 0) {
              body += '\n\n### Optional follow-ups (non-blocking)\n';
              for (const f of followups) {
                body += `\n- ${f}`;
              }
            }

            if (unplaced.length > 0) {
              body += `\n\nNote: ${unplaced.length} blocking finding(s) could not be placed inline because the requested path/line was not in the current PR diff.`;
            }
            if (reviewMarker) {
              body += `\n\n${reviewMarker}`;
            }

            const payload = {
              owner,
              repo,
              pull_number,
              event: 'COMMENT',
              body,
              commit_id,
            };
            if (comments.length > 0) {
              payload.comments = comments;
            }

            await github.rest.pulls.createReview(payload);
            core.info(`Published one deterministic review with ${comments.length} inline comment(s).`);

  cleanup-claude-stray-artifacts:
    name: Cleanup stray Claude artifacts from this run
    needs: [claude-review]
    if: always() && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.draft == false && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Cleanup issue comments and claude-authored review spam
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          RUN_STARTED_AT: ${{ needs.claude-review.outputs.cleanup_started_at }}
          SHOULD_PUBLISH: ${{ needs.claude-review.outputs.should_publish }}
          PUBLISH_RESULT: ${{ needs.claude-review.outputs.publish_result }}
          REVIEW_MARKER: "<!-- claude-review-run:${{ github.run_id }}:${{ github.run_attempt }} -->"
        with:
          retries: 3
          retry-exempt-status-codes: 400,401,403,404,422
          script: |
            try {
              const startedAt = Date.parse(process.env.RUN_STARTED_AT || '');
              if (Number.isNaN(startedAt)) {
                core.warning(`Invalid RUN_STARTED_AT: ${process.env.RUN_STARTED_AT}`);
                return;
              }

              const owner = context.repo.owner;
              const repo = context.repo.repo;
              const issue_number = context.payload.pull_request.number;
              const strayAuthors = new Set(['claude', 'claude[bot]']);
              const isKnownClaudeBotAuthor = (user) => {
                const login = user?.login || '';
                const type = user?.type || '';
                return strayAuthors.has(login) && type === 'Bot';
              };

              const issueComments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });

              const strayIssueComments = issueComments.filter((c) => {
                const created = Date.parse(c.created_at || '');
                return isKnownClaudeBotAuthor(c.user) && !Number.isNaN(created) && created >= startedAt;
              });

              for (const c of strayIssueComments) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
              }
              core.info(`Deleted ${strayIssueComments.length} stray issue comment(s).`);

              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: issue_number,
                per_page: 100,
              });
              const marker = process.env.REVIEW_MARKER || '';
              const isPublishedReview = (r) => {
                const body = r.body || '';
                return isKnownClaudeBotAuthor(r.user) && marker && body.includes(marker);
              };
              const publishedReviews = reviews.filter((r) => {
                return isPublishedReview(r);
              });
              const publishedReviewIds = new Set(publishedReviews.map((r) => r.id));

              const strayReviews = reviews.filter((r) => {
                const submitted = Date.parse(r.submitted_at || '');
                return isKnownClaudeBotAuthor(r.user) && !Number.isNaN(submitted) && submitted >= startedAt && !isPublishedReview(r);
              });

              for (const r of strayReviews) {
                try {
                  await github.graphql(
                    `mutation($subjectId:ID!) {
                      minimizeComment(input:{subjectId:$subjectId, classifier:OUTDATED}) {
                        minimizedComment { isMinimized }
                      }
                    }`,
                    { subjectId: r.node_id },
                  );
                } catch (err) {
                  core.warning(`Failed to minimize review ${r.id}: ${err.message}`);
                }
              }
              core.info(`Minimized ${strayReviews.length} stray claude-authored review(s).`);

              const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
                owner,
                repo,
                pull_number: issue_number,
                per_page: 100,
              });

              const strayReviewComments = reviewComments.filter((c) => {
                const created = Date.parse(c.created_at || '');
                const onPublishedReview = publishedReviewIds.has(c.pull_request_review_id);
                return isKnownClaudeBotAuthor(c.user) && !Number.isNaN(created) && created >= startedAt && !onPublishedReview;
              });

              for (const c of strayReviewComments) {
                try {
                  await github.graphql(
                    `mutation($subjectId:ID!) {
                      minimizeComment(input:{subjectId:$subjectId, classifier:OUTDATED}) {
                        minimizedComment { isMinimized }
                      }
                    }`,
                    { subjectId: c.node_id },
                  );
                } catch (err) {
                  core.warning(`Failed to minimize review comment ${c.id}: ${err.message}`);
                }
              }
              core.info(`Minimized ${strayReviewComments.length} stray claude-authored review comment(s).`);

              if (process.env.SHOULD_PUBLISH === 'true' && process.env.PUBLISH_RESULT === 'success') {
                const refreshed = await github.paginate(github.rest.pulls.listReviews, {
                  owner,
                  repo,
                  pull_number: issue_number,
                  per_page: 100,
                });
                  const published = refreshed.filter((r) => {
                    const body = r.body || '';
                    return marker && body.includes(marker);
                  });
                  if (published.length !== 1) {
                    core.setFailed(`Expected exactly one published review for marker ${marker}, found ${published.length}.`);
                  }
                }
            } catch (err) {
              const status = err?.status || err?.response?.status;
              if ([500, 502, 503, 504].includes(status)) {
                core.warning(`Cleanup skipped due to transient GitHub API error (${status}): ${err.message}`);
                return;
              }
              throw err;
            }
